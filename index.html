<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZ.Auto 电子书极简管理面板</title>
    <style>
        /* 极简主义 UI 设计 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f4f6f8; color: #1a1a1a; padding: 20px 12px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: #ffffff; padding: 24px 16px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04); }
        h1 { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #111111; text-align: center; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .status-badge { font-size: 11px; font-weight: normal; background: #e6f4ea; color: #137333; padding: 2px 6px; border-radius: 4px; }
        
        /* 搜索框 */
        .search-box { width: 100%; padding: 12px 14px; font-size: 15px; border: 1px solid #e0e0e0; border-radius: 8px; background-color: #fafafa; transition: all 0.2s ease; outline: none; margin-bottom: 16px; display: none; }
        .search-box:focus { border-color: #000000; background-color: #ffffff; box-shadow: 0 0 0 3px rgba(0,0,0,0.04); }
        
        /* 结果列表 */
        .result-item { padding: 14px; border: 1px solid #f0f0f0; border-radius: 8px; margin-bottom: 10px; background-color: #ffffff; position: relative; word-wrap: break-word; }
        .book-name { font-weight: 600; font-size: 14px; margin-bottom: 6px; color: #000000; padding-right: 90px; }
        .info-row { font-size: 12px; color: #666; width: 100%; overflow: hidden; padding-right: 90px; line-height: 1.4; white-space: normal; }
        
        /* 复制按钮 */
        .copy-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: #000000; color: #ffffff; border: none; padding: 8px 12px; font-size: 11px; font-weight: 500; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .copy-btn.copied { background: #28a745; }
        .no-result { text-align: center; color: #999; font-size: 13px; padding: 30px 0; }
        .loading { text-align: center; color: #666; font-size: 14px; padding: 40px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 电子书云端面板 <span id="countBadge" class="status-badge">同步中...</span></h1>
    <input type="text" id="searchInput" class="search-box" placeholder="输入书名关键字实时搜索..." autofocus>
    <div id="resultsList"><div class="loading">正在同步 CSV 数据库，请稍候...</div></div>
</div>

<script>
    let bookData = [];
    const searchInput = document.getElementById('searchInput');
    const resultsList = document.getElementById('resultsList');
    const countBadge = document.getElementById('countBadge');

    // 自动获取同目录下的 book_v2.csv 文件
    fetch('book_v2.csv')
        .then(response => {
            if (!response.ok) throw new Error('未找到表格文件');
            return response.text();
        })
        .then(text => {
            parseCSV(text);
        })
        .catch(err => {
            resultsList.innerHTML = `<div class="no-result">❌ 数据同步失败，请确保仓库中存在 book_v2.csv 且名字正确</div>`;
        });

    function parseCSV(text) {
        bookData = [];
        const lines = text.split(/\r?\n/);
        
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            
            // 找到第一个逗号的位置，精准切分书名和链接，防止链接内部有逗号导致切错
            const firstComma = lines[i].indexOf(',');
            if (firstComma !== -1) {
                const name = lines[i].substring(0, firstComma).replace(/"/g, '').trim();
                const url = lines[i].substring(firstComma + 1).replace(/"/g, '').trim();
                
                if (name) {
                    bookData.push({ name: name, url: url });
                }
            }
        }

        if (bookData.length > 0) {
            searchInput.style.style.display = 'block';
            countBadge.innerText = `已加载 ${bookData.length} 本书`;
            renderResults(bookData);
        } else {
            resultsList.innerHTML = '<div class="no-result">表格内似乎没有有效数据</div>';
        }
    }

    function renderResults(filteredBooks) {
        resultsList.innerHTML = '';
        if (filteredBooks.length === 0) {
            resultsList.innerHTML = '<div class="no-result">❌ 未找到相关电子书</div>';
            return;
        }

        filteredBooks.forEach((book, index) => {
            const item = document.createElement('div');
            item.className = 'result-item';

            item.innerHTML = `
                <div class="book-name">${book.name}</div>
                <div class="info-row">${book.url}</div>
                <button class="copy-btn" id="btn-${index}">一键复制</button>
            `;
            resultsList.appendChild(item);

            // 直接绑定纯文本复制，没有任何中间加密，100%原样复制链接和提取码
            document.getElementById(`btn-${index}`).addEventListener('click', function() {
                navigator.clipboard.writeText(book.url).then(() => {
                    this.innerText = '已复制 ✓';
                    this.className = 'copy-btn copied';
                    setTimeout(() => {
                        this.innerText = '一键复制';
                        this.className = 'copy-btn';
                    }, 1200);
                }).catch(err => {
                    alert('复制失败，请升级手机浏览器或手动长按复制');
                });
            });
        });
    }

    searchInput.addEventListener('input', (e) => {
        const keyword = e.target.value.trim().toLowerCase();
        const matched = bookData.filter(book => book.name.toLowerCase().includes(keyword));
        renderResults(matched);
    });
</script>

</body>
</html>
