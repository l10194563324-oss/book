<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZ.Auto 电子书云端面板</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f4f6f8; color: #1a1a1a; padding: 20px 12px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: #ffffff; padding: 24px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04); }
        h1 { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #111111; text-align: center; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .status-badge { font-size: 11px; font-weight: normal; background: #e6f4ea; color: #137333; padding: 2px 6px; border-radius: 4px; }
        .search-box { width: 100%; padding: 12px 14px; font-size: 15px; border: 1px solid #e0e0e0; border-radius: 8px; background-color: #fafafa; transition: all 0.2s ease; outline: none; margin-bottom: 16px; }
        .search-box:focus { border-color: #000000; background-color: #ffffff; box-shadow: 0 0 0 3px rgba(0,0,0,0.04); }
        .result-item { padding: 14px; border: 1px solid #f0f0f0; border-radius: 8px; margin-bottom: 10px; background-color: #ffffff; position: relative; }
        .book-name { font-weight: 600; font-size: 14px; margin-bottom: 6px; color: #000000; padding-right: 85px; }
        .info-row { font-size: 12px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 85px; }
        .copy-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: #000000; color: #ffffff; border: none; padding: 8px 12px; font-size: 11px; font-weight: 500; border-radius: 6px; cursor: pointer; }
        .copy-btn.copied { background: #28a745; }
        .no-result { text-align: center; color: #999; font-size: 13px; padding: 30px 0; }
        .loading { text-align: center; color: #666; font-size: 14px; padding: 40px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 电子书云端面板 <span id="countBadge" class="status-badge">同步中...</span></h1>
    <input type="text" id="searchInput" class="search-box" placeholder="输入书名关键字实时搜索..." style="display:none;">
    <div id="resultsList"><div class="loading">正在从您的 Excel 表格同步数据，请稍候...</div></div>
</div>

<script>
    let bookData = [];
    const searchInput = document.getElementById('searchInput');
    const resultsList = document.getElementById('resultsList');
    const countBadge = document.getElementById('countBadge');

    // 💡 核心黑科技：自动获取当前 GitHub 仓库目录下的 book_v2.csv 文件
    // 这样你以后只要更新仓库里的 csv 即可，网页会自动读取最新的！
    fetch('book_v2.csv')
        .then(response => {
            if (!response.ok) throw new Error('未找到表格文件');
            return response.text();
        })
        .then(text => {
            parseCSV(text);
        })
        .catch(err => {
            resultsList.innerHTML = `<div class="no-result">❌ 数据同步失败，请检查仓库中是否存在 book_v2.csv 文件</div>`;
        });

    function parseCSV(text) {
        bookData = [];
        const lines = text.split(/\r?\n/);
        
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const cells = lines[i].split(',');
            if (cells.length >= 2) {
                bookData.push({
                    name: cells[0].replace(/"/g, '').trim(),
                    url: cells[1].replace(/"/g, '').trim()
                });
            }
        }

        if (bookData.length > 0) {
            searchInput.style.display = 'block';
            countBadge.innerText = `已连线 ${bookData.length} 本书`;
            renderResults(bookData);
        } else {
            resultsList.innerHTML = '<div class="no-result">表格内似乎没有有效数据</div>';
        }
    }

    function renderResults(filteredBooks) {
        resultsList.innerHTML = '';
        if (filteredBooks.length === 0) {
            resultsList.innerHTML = '<div class="no-result">❌ 未找到相关电子书</div>';
            return;
        }

        filteredBooks.forEach(book => {
            const item = document.createElement('div');
            item.className = 'result-item';
            const fullTextToCopy = `亲，您购买的《${book.name}》下载链接已准备好：\n\n🔗 ${book.url}\n\n⚠️ 提示：请复制整段链接到浏览器或网盘APP打开下载。祝您阅读愉快！`;

            item.innerHTML = `
                <div class="book-name">《${book.name}》</div>
                <div class="info-row">📋 ${book.url}</div>
                <button class="copy-btn" onclick="copyToClipboard('${btoa(unescape(encodeURIComponent(fullTextToCopy)))}', this)">复制话术</button>
            `;
            resultsList.appendChild(item);
        });
    }

    searchInput.addEventListener('input', (e) => {
        const keyword = e.target.value.trim().toLowerCase();
        const matched = bookData.filter(book => book.name.toLowerCase().includes(keyword));
        renderResults(matched);
    });

    function copyToClipboard(base64Text, button) {
        const text = decodeURIComponent(escape(atob(base64Text)));
        navigator.clipboard.writeText(text).then(() => {
            button.innerText = '已复制 ✓';
            button.className = 'copy-btn copied';
            setTimeout(() => { button.innerText = '复制话术'; button.className = 'copy-btn'; }, 1200);
        }).catch(err => { alert('复制失败'); });
    }
</script>

</body>
</html>
